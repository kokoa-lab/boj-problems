<meta charset="utf-8">
<div id="content"></div>
<button id="program">Generera inskickning</button>
<pre id="sol"></pre>

<script>
for (var i = 1; i <= 10; i++) {
  var tc = "<label>Lösning " + i + "</label>" + 
       "<textarea id='tc" + i + "'></textarea><br>";
  document.getElementById("content").innerHTML += tc;
  
}

document.getElementById("program").addEventListener('click', function() {
  var sol = "T = [int(x) for x in input().split()][0]\n";
  for (var i = 1; i <= 10; i++) {
    var solution = document.getElementById("tc"+i).value;
    sol += "if T == "+i+":\n";
    sol += '    print("""';
    sol += solution;
    sol += '""")';
    sol += "\n\n";
  }
  document.getElementById("sol").innerText = sol;
});
</script>
